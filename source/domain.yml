version: "3.1"

slots:
  requested_slot:
    type: text
    mappings:
      - type: custom

  tip_usluge:
    type: text
    mappings:
      - type: controlled


  is_ured:
    type: bool
    mappings: [{ type: controlled }]
  is_sala:
    type: bool
    mappings: [{ type: controlled }]

  oznaka_ureda:
    type: text
    mappings:
      - type: from_entity
        entity: oznaka_ureda

  paket:
    type: text
    mappings:
      - type: from_entity
        entity: paket
      - type: from_text
        intent: choose_paket


  termin:
    type: text
    mappings:
      - type: from_text
        intent: provide_termin

  termin_input:
    type: text
    mappings:
      - type: from_text

  
  ime_prezime_input:
    type: text
    mappings:
      - type: from_text

  ime_prezime:
    type: text
    mappings:
      - type: controlled


  napomena_input:
    type: text
    mappings:
      - type: from_text

  napomena:
    type: text
    mappings:
      - type: controlled



  email:
    type: text
    mappings:
      - type: from_entity
        entity: email
      - type: from_text
        intent: provide_email


  cijena:
    type: text
    mappings: [{ type: controlled }]


  potvrda_paketa:
    type: bool
    mappings:
      - type: controlled

  potvrda_rezervacije:
    type: bool
    mappings:
      - type: controlled

  continue_conversation:
    type: bool
    mappings:
      - type: from_intent
        intent: affirm
        value: true
      - type: from_intent
        intent: deny
        value: false


responses:
  utter_ask_tip_usluge:
    - text: "Koji prostor želite rezervirati?"
      buttons:
        - title: "Flydesk"
          payload: '/SetSlots(tip_usluge="Flydesk")'
        - title: "Sala za sastanke"
          payload: '/SetSlots(tip_usluge="Sala za sastanke")'
        - title: "Konferencijska dvorana"
          payload: '/SetSlots(tip_usluge="Konferencijska dvorana")'
        - title: "Mletačka dvorana"
          payload: '/SetSlots(tip_usluge="Mletačka dvorana")'
        - title: "Uredski prostor"
          payload: '/SetSlots(tip_usluge="Uredski prostor")'



  utter_ask_oznaka_ureda:
    - text: "Molimo odaberite ured koji želite rezervirati:"
      buttons:
        - title: "Ured 04"
          payload: '/choose_ured{{"oznaka_ureda":"04"}}'
        - title: "Ured 05"
          payload: '/choose_ured{{"oznaka_ureda":"05"}}'
        - title: "Ured 06"
          payload: '/choose_ured{{"oznaka_ureda":"06"}}'
        - title: "Ured 07"
          payload: '/choose_ured{{"oznaka_ureda":"07"}}'
        - title: "Ured 09"
          payload: '/choose_ured{{"oznaka_ureda":"09"}}'

  utter_ask_paket:
    - condition:
        - type: slot
          name: tip_usluge
          value: "Konferencijska dvorana"
      text: "Odaberite paket za dvoranu:"
      buttons:
        - title: "1 sat"
          payload: '/choose_paket{{"paket":"1 sat"}}'
        - title: "1 dan"
          payload: '/choose_paket{{"paket":"1 dan"}}'



    - condition:
        - type: slot
          name: tip_usluge
          value: "Flydesk"
      text: "Odaberite Flydesk paket:"
      buttons:
        - title: "1 dan"
          payload: '/choose_paket{{"paket":"1 dan"}}'
        - title: "5 dana"
          payload: '/choose_paket{{"paket":"5 dana"}}'
        - title: "10 dana"
          payload: '/choose_paket{{"paket":"10 dana"}}'
        - title: "1 mjesec"
          payload: '/choose_paket{{"paket":"1 mjesec"}}'
        - title: "3 mjeseca"
          payload: '/choose_paket{{"paket":"3 mjeseca"}}'

  utter_ask_termin:
    - condition:
        - type: slot
          name: paket
          value: "1 sat"
      text: "Navedite datum i sat (npr. 25.02. u 12:00):"

    - condition:
        - type: slot
          name: tip_usluge
          value: "Flydesk"
        - type: slot
          name: paket
          value: "1 dan"
      text: "Za koji datum želite rezervirati Flydesk?"

    - condition:
        - type: slot
          name: tip_usluge
          value: "Flydesk"
        - type: slot
          name: paket
          value: "1 mjesec"
      text: "Od kojeg datuma želite započeti Vašu rezervaciju (prvi dan korištenja)?"

    - condition:
        - type: slot
          name: tip_usluge
          value: "Flydesk"
        - type: slot
          name: paket
          value: "3 mjeseca"
      text: "Od kojeg datuma želite započeti Vašu rezervaciju (prvi dan korištenja)?"
    - condition:
        - type: slot
          name: tip_usluge
          value: "Flydesk"
        - type: slot
          name: paket
          value: "5 dana"
      text: "Od kojeg datuma želite započeti Vašu rezervaciju (prvi dan korištenja)?"
    - condition:
        - type: slot
          name: tip_usluge
          value: "Flydesk"
        - type: slot
          name: paket
          value: "10 dana"
      text: "Od kojeg datuma želite započeti Vašu rezervaciju (prvi dan korištenja)?"

    - condition:
        - type: slot
          name: is_ured
          value: true
      text: "Od kojeg datuma želite započeti Vašu rezervaciju (prvi dan korištenja)?"

    - text: "Za koji datum želite rezervaciju"


  utter_ask_termin_input:
    - text: "Navedite datum i sat (npr. 2.2. u 11 ili 2.2. u 11:30):"


  utter_ask_ime_prezime:
    - text: "Molimo unesite Vaše ime i prezime:"

  utter_ask_ime_prezime_input:
    - text: "Molimo unesite Vaše ime i prezime:"

  utter_ask_email:
      - text: "Vaš e-mail:"

  utter_ask_napomena:
    - text: "Upišite napomenu: "

  utter_ask_napomena_input:
    - text: "Upišite napomenu:"

  utter_ask_potvrda_paketa:
    - text: "Cijena iznosi {cijena}. Nastavljamo dalje?"
      buttons:
        - title: "Da"
          payload: "/SetSlots(potvrda_paketa=true)"
        - title: "Ne"
          payload: "/SetSlots(potvrda_paketa=false)"

  utter_ask_potvrda_rezervacije:
    - text: "Jesu li svi podaci točni?"
      buttons:
        - title: "Da"
          payload: "/SetSlots(potvrda_rezervacije=true)"
        - title: "Ne"
          payload: "/SetSlots(potvrda_rezervacije=false)"



  utter_summary_ostalo:
    - text: |
        Prostor: {tip_usluge}
        Paket: {paket}
        Termin: {termin}
        Ime i prezime: {ime_prezime}
        E-mail: {email}
        Napomena: {napomena}

  utter_summary_ured:
    - text: |
        Ured oznaka: {oznaka_ureda}
        Cijena: {cijena}
        Pocetak: {termin}
        Ime i prezime: {ime_prezime}
        E-mail: {email}
        Napomena: {napomena}

  utter_official_next_steps:
    - text: "Hvala! Upit je zaprimljen. Javit ćemo se e-mailom."

  utter_reservation_cancelled:
    - text: "Rezervacija otkazana."

  utter_kb_fallback:
    - text: "Nemam tu informaciju u bazi. Možeš li malo drugačije formulirati pitanje ili želiš kontakt IDA-e?"

  utter_ida_phone:
    - text: "Telefon IDA-e je +385 52 381 900."

  utter_contact:
    - text: "Glavni kontakt broj telefona je +385 52 381 900, a službena e-mail adresa je ida-uprava@ida.hr."
  utter_bank_criteria_fallback:
    - text: "Nemam tu informaciju u bazi. Želiš li da ti pošaljem kontakt IDA-e ili da preformuliraš pitanje (npr. naziv programa/kreditne linije)?"
  utter_start_reservation:
    - text: "Super!"


  utter_ask_continue_conversation:
    - text: "Imate li još nešto što bih mogao pomoći?"
      buttons:
        - title: "Da"
          payload: "/affirm"
        - title: "Ne"
          payload: "/deny"

  utter_goodbye:
    - text: "U redu 🙂 Ako zatrebate nešto, tu sam."


actions:
  - action_reset_slots
  - action_set_is_ured
  - action_show_ured_offer
  - action_set_paket_monthly
  - action_route_ostalo
  - action_check_if_sala
  - action_set_sala_offer
  - action_set_flydesk_cijena
  - action_save_reservation
  - action_check_is_ured_for_summary
  - action_answer_from_kb
  - action_set_ime_prezime
  - action_set_napomena
  - action_set_termin_sat
  - action_set_termin
  - action_route_termin

#q&a


intents:
  - start_reservation
  - greet
  - goodbye
  - ask_kb
  - ask_contact   # Dodaj ovo
  - ask_location  # Dodaj ovo
  - ask_id_info   #
  - ask_bank_criteria
  - inform
  - affirm
  - deny
  - choose_paket
  - choose_ured
  - provide_termin
  - provide_name
  - provide_note
  - provide_email


entities:
  - tip_usluge
  - paket
  - oznaka_ureda
  - email




forms:
  continue_conversation:
    required_slots:
      - continue_conversation
