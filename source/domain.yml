version: "3.1"

slots:
  tip_usluge:
    type: text
    mappings: [{ type: from_llm }]
  is_ured:
    type: bool
    mappings: [{ type: controlled }]
  is_sala:
    type: bool
    mappings: [{ type: controlled }]
  oznaka_ureda:
    type: text
    mappings: [{ type: from_llm }]
  paket:
    type: text
    mappings: [{ type: from_llm }]
  termin:
    type: text
    mappings: [{ type: from_llm }]
  ime_prezime:
    type: text
    mappings: [{ type: from_llm }]
  email:
    type: text
    mappings: [{ type: from_llm }]
  napomena:
    type: text
    mappings: [{ type: from_llm }]
  cijena:
    type: text
    mappings: [{ type: controlled }]
  potvrda_paketa:
    type: bool
    mappings: [{ type: from_llm }]
  potvrda_rezervacije:
    type: bool
    mappings: [{ type: from_llm }]


responses:


  utter_ask_tip_usluge:
    - text: "Koji prostor želite rezervirati?"
      buttons:
        - title: "Flydesk"
          payload: "Flydesk"
        - title: "Sala za sastanke"
          payload: "Sala za sastanke"
        - title: "Konferencijska dvorana"
          payload: "Konferencijska dvorana"
        - title: "Mletačka dvorana"
          payload: "Mletačka dvorana"
        - title: "Uredski prostor"
          payload: "Uredski prostor"

  utter_ask_oznaka_ureda:
    - text: "Molimo odaberite ured koji želite rezervirati:"
      buttons:
        - title: "Ured 04"
          payload: "04"
        - title: "Ured 05"
          payload: "05"
        - title: "Ured 06"
          payload: "06"
        - title: "Ured 07"
          payload: "07"
        - title: "Ured 09"
          payload: "09"

  utter_ask_paket:
    - condition:
        - type: slot
          name: tip_usluge
          value: "konferencijska dvorana"
      text: "Odaberite paket za dvoranu:"
      buttons:
        - title: "1 sat"
          payload: "1 sat"
        - title: "1 dan"
          payload: "1 dan"
    - text: "Odaberite Flydesk paket:"
      buttons:
        - title: "1 dan"
          payload: "1 dan"
        - title: "5 dana"
          payload: "5 dana"
        - title: "10 dana"
          payload: "10 dana"
        - title: "1 mjesec"
          payload: "1 mjesec"
        - title: "3 mjeseca"
          payload: "3 mjeseca"

  utter_ask_termin:
    - condition:
        - type: slot
          name: paket
          value: "1 sat"
      text: "Navedite datum i sat (npr. 25.02. u 12:00):"
    - condition:
       - type: slot
         name: tip_usluge
         value: "Flydesk"
       - type: slot
         name: paket
         value: "1 dan"
      text: "Za koji datum želite rezervirati Flydesk?"
    - condition:
        - type: slot
          name: is_ured
          value: true
      text: "Od kojeg datuma želite započeti Vašu rezervaciju (prvi dan korištenja)?"
    - condition:
        - type: slot
          name: tip_usluge
          value: "Flydesk"
      text: "Od kojeg datuma želite započeti Vašu rezervaciju (prvi dan korištenja)?"
    - condition:
        - type: slot
          name: paket
          value: "po satu"
      text: "Navedite datum i sat (npr. 25.02. u 12:00):"
    - text: "Za koji datum želite rezervaciju"

  utter_ask_ime_prezime:
    - text: "Molimo unesite Vaše ime i prezime:"

  utter_ask_email:
      - text: "Vaš e-mail:"

  utter_ask_napomena:
    - text: "Upišite napomenu: "

  utter_ask_potvrda_paketa:
    - text: "Cijena iznosi {cijena}. Nastavljamo dalje?"

  utter_ask_potvrda_rezervacije:
    - text: "Jesu li svi podaci točni (da/ne)?"

  utter_summary_ostalo:
    - text: |
        Prostor: {tip_usluge}
        Paket: {paket}
        Termin: {termin}
        Ime i prezime: {ime_prezime}
        E-mail: {email}
        Napomena: {napomena}

  utter_summary_ured:
    - text: |
        Ured oznaka: {oznaka_ureda}
        Cijena: {cijena}
        Pocetak: {termin}
        Ime i prezime: {ime_prezime}
        E-mail: {email}
        Napomena: {napomena}

  utter_official_next_steps:
    - text: "Hvala! Upit je zaprimljen. Javit ćemo se e-mailom."

  utter_reservation_cancelled:
    - text: "Rezervacija otkazana."

  utter_kb_fallback:
    - text: "Nemam tu informaciju u bazi. Možeš li malo drugačije formulirati pitanje ili želiš kontakt IDA-e?"

  utter_ida_phone:
    - text: "Telefon IDA-e je +385 52 381 900."

  utter_contact:
    - text: "Glavni kontakt broj telefona je +385 52 381 900, a službena e-mail adresa je ida-uprava@ida.hr."
  utter_bank_criteria_fallback:
    - text: "Nemam tu informaciju u bazi. Želiš li da ti pošaljem kontakt IDA-e ili da preformuliraš pitanje (npr. naziv programa/kreditne linije)?"
  utter_start_reservation:
    - text: "Super! Što želiš rezervirati: ured, konferencijsku salu ili flydesk?"

actions:
  - action_set_is_ured
  - action_show_ured_offer
  - action_set_paket_monthly
  - action_route_ostalo
  - action_check_if_sala
  - action_set_sala_offer
  - action_set_flydesk_cijena
  - action_save_reservation
  - action_check_is_ured_for_summary
  - action_answer_from_kb


#q&a


intents:
  - start_reservation
  - greet
  - goodbye
  - ask_kb
  - ask_contact   # Dodaj ovo
  - ask_location  # Dodaj ovo
  - ask_id_info   #
  - ask_bank_criteria
