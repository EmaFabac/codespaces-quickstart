flows:
  rezervacija_prostora:
    description: Službeni upit za rezervaciju (IDA/Coworking Pula).
    nlu_trigger:
      - intent: start_reservation
        confidence_threshold: 0.6

    steps:
      - action: action_reset_slots
      - action: action_set_in_reservation_true
      - action: utter_start_reservation
      - collect: tip_usluge

      - action: action_set_is_ured
        next:
          - if: slots.is_ured
            then: ured_grana
          - else: ostalo_grana

      # --- UREDSKI PROSTOR ---
      - collect: oznaka_ureda
        id: ured_grana
      - action: action_show_ured_offer
      - action: action_set_paket_monthly
        next: potvrda_cijene_blok

      # --- OSTALO (Flydesk, Sala, Mletačka, Konferencijska) ---
      - action: action_route_ostalo
        id: ostalo_grana
      - action: action_check_if_sala
        next:
          - if: slots.is_sala
            then: postavi_fiksnu_cijenu_automatski
          - else: pitaj_paket_rucno

      # SALA & MLETAČKA: Automatski set cijene
      - action: action_set_sala_offer
        id: postavi_fiksnu_cijenu_automatski
        next: potvrda_cijene_blok

      # FLYDESK / OBIČNA KONFERENCIJSKA: Ručni odabir
      - collect: paket
        id: pitaj_paket_rucno
      - action: action_set_flydesk_cijena
        next: potvrda_cijene_blok

      # POTVRDA CIJENE (Zajednička za sve)
      - collect: potvrda_paketa
        ask_before_filling: true
        id: potvrda_cijene_blok
        next:
          - if: slots.potvrda_paketa
            then: termin_grana
          - else: odustani_proces

      # TERMIN - prebacivanje na sat / nesat
      - action: action_route_termin
        id: termin_grana
        next:
          - if: slots.paket == "1 sat" or slots.tip_usluge == "Mletačka dvorana"
            then: termin_sat
          - else: termin_normal

      # 1 SAT: strogi unos
      - collect: termin_input
        id: termin_sat
        ask_before_filling: true
      - action: action_set_termin
        next: 
            - if: slots.termin == null
              then: termin_sat
            - else: ured_check_extra  

      # OSTALO: termin bez sata (ili slobodni unos)
      - collect: termin
        id: termin_normal
        ask_before_filling: true
      - action: action_validate_termin_general
        next:
            - if: slots.termin == null
              then: termin_normal
            - else: ured_check_extra

      # --- ROUTING KORAK (ne skuplja slot, samo grananje) ---
      - action: action_route_ured_extra
        id: ured_check_extra
        next:
          - if: slots.is_ured
            then: ured_dodatni_start
          - else: osobni_podaci

      # --- DODATNI PODACI SAMO ZA URED ---
      - collect: naziv_pravne_osobe
        id: ured_dodatni_start
        ask_before_filling: true
      - collect: ovlastena_osoba
        ask_before_filling: true
      - collect: adresa
        ask_before_filling: true
      - collect: telefon
        ask_before_filling: true
      - collect: web_stranica
        ask_before_filling: true
      - collect: oib
        ask_before_filling: true
      - collect: sektor
        ask_before_filling: true
      - collect: broj_zaposlenih
        ask_before_filling: true
      - collect: datum_osnivanja
        ask_before_filling: true
      - collect: opis_poslovanja
        ask_before_filling: true
      - collect: inovativni_aspekti
        ask_before_filling: true
      - collect: doprinos_zajednici
        ask_before_filling: true
      - collect: ostale_napomene
        ask_before_filling: true
      - collect: mjesto_datum
        ask_before_filling: true
        next: osobni_podaci

      # OSOBNI PODACI (join point)
      - collect: ime_prezime_input
        id: osobni_podaci
        ask_before_filling: true

      - action: action_set_ime_prezime
        next:
          - if: slots.ime_prezime == null
            then: osobni_podaci
          - else: email_korak

      - collect: email
        id: email_korak
        ask_before_filling: true

      - collect: napomena_input
        ask_before_filling: true
      - action: action_set_napomena

      - action: action_check_is_ured_for_summary
        next:
          - if: slots.is_ured
            then: summary_ured_grana
          - else: summary_ostalo_grana

      - action: utter_summary_ured
        id: summary_ured_grana
        next: finalna_potvrda

      - action: utter_summary_ostalo
        id: summary_ostalo_grana
        next: finalna_potvrda

      - collect: potvrda_rezervacije
        ask_before_filling: true
        id: finalna_potvrda
        next:
          - if: slots.potvrda_rezervacije
            then: spremi_baza
          - else: odustani_proces

      - action: action_save_reservation
        id: spremi_baza
        next: kraj_flowa

      # --- ODUSTAJANJE ---
      - action: action_set_in_reservation_false
        id: odustani_proces
      - action: utter_reservation_cancelled
        next: END

      # --- USPJEŠAN KRAJ ---
      - action: action_set_in_reservation_false
        id: kraj_flowa
      - action: utter_official_next_steps
        next: END
