recipe: default.v1
language: hr
assistant_id: ida-bot

pipeline:
  - name: WhitespaceTokenizer
  - name: RegexFeaturizer
  - name: LexicalSyntacticFeaturizer
  - name: CountVectorsFeaturizer
  - name: CountVectorsFeaturizer
    analyzer: char_wb
    min_ngram: 1
    max_ngram: 4
  - name: DIETClassifier
    epochs: 100
  - name: EntitySynonymMapper
  - name: ResponseSelector
    epochs: 100
  - name: FallbackClassifier
    threshold: 0.3
    ambiguity_threshold: 0.1
  - name: NLUCommandAdapter

policies:
  - name: RulePolicy
    priority: 6 # RulePolicy mora biti najjači
  - name: FlowPolicy
    priority: 1 # FlowPolicy stavljamo na dno